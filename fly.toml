# Fly.io app definition — deploy with:
#   fly launch --no-deploy   (creates the app, keep this file)
#   fly secrets set JWT_SECRET=<random 32+ chars> DB_URL=... DB_USER=... DB_PASSWORD=...
#   fly deploy
app = "minibank"
primary_region = "cdg"

[build]
  # uses the Dockerfile in this directory

[http_service]
  internal_port = 8080
  force_https = true
  # suspend resumes in seconds; a full stop means ~2 min of JVM cold start
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/actuator/health"
    interval = "30s"
    timeout = "5s"
    # JVM cold start on shared-cpu is slow; give it room
    grace_period = "120s"

[[vm]]
  # 1x shared CPU starves the JVM at boot: PostgreSQL times out the
  # half-open connections (EOF during auth) and startup crash-loops
  size = "shared-cpu-2x"
  memory = "1gb"
