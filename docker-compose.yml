services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: minibank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # host port 5433 to avoid clashing with a locally installed PostgreSQL;
      # point the app at it with DB_URL=jdbc:postgresql://localhost:5433/minibank
      - "5433:5432"
    volumes:
      - minibank-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minibank"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  minibank-data:
