spring:
  application:
    name: minibank
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/minibank}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration

minibank:
  security:
    # HS256 needs >= 256 bits; override in real deployments
    jwt-secret: ${JWT_SECRET:dev-only-secret-change-me-0123456789abcdef}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: 8080
