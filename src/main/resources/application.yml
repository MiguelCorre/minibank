spring:
  application:
    name: minibank
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:minibank;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: 8080
