<div class="shell">
  <nav class="topbar">
    <a class="brand" routerLink="/">mini<strong>bank</strong></a>
    @if (auth.user(); as user) {
      <div class="links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Accounts</a>
        <a routerLink="/transfer" routerLinkActive="active">Transfer</a>
        <span class="user-chip">{{ user.displayName }}</span>
        <button class="btn ghost small-btn" type="button" (click)="logout()">Sign out</button>
      </div>
    }
  </nav>

  <main>
    <router-outlet />
  </main>

  <footer class="footer muted">
    minibank — Java 21 · Spring Boot · PostgreSQL · Angular
  </footer>
</div>
